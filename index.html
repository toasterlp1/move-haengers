<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GamingHub 🎮</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>
  <div id="app">
    <!-- Topbar -->
    <header id="topbar">
      <a class="logo" href="#" onclick="GH.navigate('dashboard');return false">
        <div class="logo-icon"><i class="ti ti-device-gamepad-2"></i></div>
        <span class="logo-text">GAMING<span>HUB</span></span>
      </a>

      <nav class="topbar-nav">
        <button class="nav-btn active" id="nav-dashboard"   onclick="GH.navigate('dashboard')">
          <i class="ti ti-layout-dashboard"></i> Dashboard
        </button>
        <button class="nav-btn" id="nav-events"    onclick="GH.navigate('events')">
          <i class="ti ti-calendar-event"></i> Sessions
        </button>
        <button class="nav-btn" id="nav-polls"     onclick="GH.navigate('polls')">
          <i class="ti ti-chart-bar"></i> Umfragen
        </button>
        <button class="nav-btn" id="nav-library"   onclick="GH.navigate('library')">
          <i class="ti ti-device-gamepad"></i> Library
        </button>
        <button class="nav-btn" id="nav-chat"      onclick="GH.navigate('chat')">
          <i class="ti ti-message-circle"></i> Chat
        </button>
        <button class="nav-btn" id="nav-profiles"  onclick="GH.navigate('profiles')">
          <i class="ti ti-users"></i> Squad
        </button>
      </nav>

      <div class="topbar-actions">
        <button class="icon-btn" id="topbar-notif-btn" title="Benachrichtigungen" onclick="GH.navigate('settings');setTimeout(()=>Settings.switchSection('notifications'),100)">
          <i class="ti ti-bell"></i>
          <span class="notif-dot" id="notif-dot" style="display:none"></span>
        </button>
        <button class="icon-btn" onclick="GH.navigate('settings')" title="Einstellungen">
          <i class="ti ti-settings"></i>
        </button>
        <button class="icon-btn" id="topbar-profile-btn" onclick="GH.handleProfileClick()" title="Profil" style="overflow:hidden;padding:0">
          <i class="ti ti-user"></i>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main id="main-content">
      <div id="dashboard-page" class="page active"></div>
      <div id="events-page"    class="page"></div>
      <div id="polls-page"     class="page"></div>
      <div id="library-page"   class="page"></div>
      <div id="chat-page"      class="page"></div>
      <div id="profiles-page"  class="page"></div>
      <div id="settings-page"  class="page"></div>
    </main>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Mobile nav -->
  <nav id="mobile-nav" style="display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(5,6,15,0.95);backdrop-filter:blur(12px);border-top:1px solid var(--dark-border);padding:0.5rem 0.25rem;z-index:500;justify-content:space-around;align-items:center">
    <button onclick="GH.navigate('dashboard')" id="mobnav-dashboard" style="background:none;border:none;color:var(--text-secondary);display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;cursor:pointer;border-radius:var(--radius-md);transition:all 0.2s;font-family:var(--font-display);font-size:0.55rem;letter-spacing:0.05em"><i class="ti ti-layout-dashboard" style="font-size:20px"></i>Home</button>
    <button onclick="GH.navigate('events')"    id="mobnav-events"    style="background:none;border:none;color:var(--text-secondary);display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;cursor:pointer;border-radius:var(--radius-md);transition:all 0.2s;font-family:var(--font-display);font-size:0.55rem;letter-spacing:0.05em"><i class="ti ti-calendar-event" style="font-size:20px"></i>Sessions</button>
    <button onclick="GH.navigate('polls')"     id="mobnav-polls"     style="background:none;border:none;color:var(--text-secondary);display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;cursor:pointer;border-radius:var(--radius-md);transition:all 0.2s;font-family:var(--font-display);font-size:0.55rem;letter-spacing:0.05em"><i class="ti ti-chart-bar" style="font-size:20px"></i>Polls</button>
    <button onclick="GH.navigate('library')"   id="mobnav-library"   style="background:none;border:none;color:var(--text-secondary);display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;cursor:pointer;border-radius:var(--radius-md);transition:all 0.2s;font-family:var(--font-display);font-size:0.55rem;letter-spacing:0.05em"><i class="ti ti-device-gamepad" style="font-size:20px"></i>Library</button>
    <button onclick="GH.navigate('chat')"      id="mobnav-chat"      style="background:none;border:none;color:var(--text-secondary);display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;cursor:pointer;border-radius:var(--radius-md);transition:all 0.2s;font-family:var(--font-display);font-size:0.55rem;letter-spacing:0.05em"><i class="ti ti-message-circle" style="font-size:20px"></i>Chat</button>
  </nav>

  <!-- JS Modules -->
  <script src="js/storage.js" defer></script>
  <script src="js/utils.js" defer></script>
  <script src="js/dashboard.js" defer></script>
  <script src="js/events.js" defer></script>
  <script src="js/polls.js" defer></script>
  <script src="js/chat.js" defer></script>
  <script src="js/library.js" defer></script>
  <script src="js/profiles.js" defer></script>
  <script src="js/settings.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
